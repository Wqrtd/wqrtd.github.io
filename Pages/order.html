<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Order Pizza from Pizzeria">
    <title>Order Now - Pizzeria</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="../index.html"><img src="../img/logo.png" alt="Pizzeria Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Locations</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="#">Promotions</a></li>
                <li><a href="order.html" class="button">Order Now</a></li>
            </ul>
        </nav>
    </header>

    <main class="order-banner">
        <div class="order-container">
            <h1>Place Your Order</h1>
            <form action="#" method="POST" class="order-form">
                <fieldset>
                    <legend>Contact & Delivery</legend>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Choose Your Pizzas</legend>
                    <div class="form-group-checkbox">
                        <input type="checkbox" id="margherita" name="pizza" value="Margherita">
                        <label for="margherita">Margherita</label>
                    </div>
                    <div class="form-group-checkbox">
                        <input type="checkbox" id="pepperoni" name="pizza" value="Pepperoni">
                        <label for="pepperoni">Pepperoni</label>
                    </div>
                    <div class="form-group-checkbox">
                        <input type="checkbox" id="vegetarian" name="pizza" value="Vegetarian">
                        <label for="vegetarian">Vegetarian</label>
                    </div>
                    <div class="form-group-checkbox">
                        <input type="checkbox" id="hawaiian" name="pizza" value="Hawaiian">
                        <label for="hawaiian">Hawaiian</label>
                    </div>
                </fieldset>

                <button type="submit" class="submit-btn">Confirm Order</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="contact-info">
                <p>123 Pizza Street, Flavor Town, USA</p>
                <p>Phone: 555-123-4567</p>
            </div>
            <p>&copy; 2024 Pizzeria. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
